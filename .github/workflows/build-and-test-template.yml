# Workaround for https://github.com/orgs/community/discussions/42335
name: build-and-test-template
on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        required: true
      target:
        type: string
        required: true
      fileending:
        type: string
        required: true
      docs_example_exclude_regex:
        type: string
        required: false
        default: ''
      docs_example_placeholder_values:
        type: string
        required: false
        default: '{}'
jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Add extra packages (MacOS)
        if: inputs.runs-on == 'macOS-latest'
        run: brew install libmodbus

      - name: Add extra packages (Linux)
        if: inputs.runs-on == 'ubuntu-24.04'
        run: sudo apt install -y libdbus-1-dev pkg-config libasound2-dev

      - name: Set up Rust
        if: inputs.runs-on == 'macOS-latest'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Rust Cache
        if: inputs.runs-on == 'macOS-latest'
        uses: Swatinem/rust-cache@v2.7.8
        with:
          key: release

      - name: Install rust target
        if: inputs.runs-on == 'macOS-latest'
        run: rustup target add ${{ inputs.target }}

      - name: Build (macOS)
        if: inputs.runs-on == 'macOS-latest'
        run: cargo build --release --target ${{ inputs.target }}

      - name: Test (macOS)
        if: inputs.runs-on == 'macOS-latest'
        run: cargo test --target ${{ inputs.target }}

      - name: Build binary
        if: inputs.runs-on != 'macOS-latest'
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ inputs.target }}
          # Add "--locked" again when release please is not updating all Cargo.toml files
          args: '--release'
          strip: true

      # - name: Test
      #   if: inputs.runs-on != 'macOS-latest'
      #   uses: houseabsolute/actions-rust-cross@v1
      #   with:
      #     command: test
      #     target: ${{ inputs.target }}
      #     # Add "--locked" again when release please is not updating all Cargo.toml files
      #     args: ''

      # Save executable
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.target }}
          path: |
            target/${{ inputs.target }}/release/ubihome${{ inputs.fileending }}

  test:
    runs-on: ${{ inputs.runs-on }}
    if: inputs.target == 'x86_64-unknown-linux-gnu'
    needs: build
    steps:
      - uses: actions/checkout@v2
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ inputs.target }}
          path: tests/

      - uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Validate documentation YAML examples
        run: |-
          chmod +x tests/ubihome
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import tempfile
          from pathlib import Path

          root = Path("documentation/docs")
          pattern = (
              os.environ.get("DOCS_EXAMPLE_EXCLUDE_REGEX")
              or r"^documentation/docs/examples/(automatic_screen_power_control/raspberry|motion_detection/raspberry)\.yml$"
          )
          placeholders_raw = os.environ.get("DOCS_EXAMPLE_PLACEHOLDER_VALUES", "{}")

          try:
              placeholders = json.loads(placeholders_raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Invalid docs placeholder JSON: {exc}")

          if not isinstance(placeholders, dict):
              raise SystemExit("DOCS_EXAMPLE_PLACEHOLDER_VALUES must be a JSON object.")

          try:
              exclude = re.compile(pattern)
          except re.error as exc:
              raise SystemExit(f"Invalid docs example exclude regex: {exc}")

          files = sorted(
              file
              for file in root.rglob("*.yml")
              if "/examples/" in file.as_posix() or "/getting_started/" in file.as_posix()
          )
          if not files:
              raise SystemExit("No documentation YAML files found to validate.")

          ubihome = str(Path("tests/ubihome").resolve())
          failed = []

          for file in files:
              rel = file.as_posix()
              if exclude.search(rel):
                  print(f"Skipping (excluded): {rel}")
                  continue

              content = file.read_text(encoding="utf-8")
              for key, value in placeholders.items():
                  value = str(value)
                  content = content.replace(f"{{{{{key}}}}}", value)
                  content = content.replace(f"<{key}>", value)
                  content = content.replace(f"__{key}__", value)

              if not re.search(r"(?m)^\s*ubihome\s*:", content):
                  content = "ubihome:\n  name: Documentation Example\n\n" + content

              with tempfile.NamedTemporaryFile("w", suffix=".yml", delete=False, encoding="utf-8") as tmp:
                  tmp.write(content)
                  tmp_path = tmp.name

              print(f"Validating: {rel}")
              try:
                  result = subprocess.run(
                      [ubihome, "-c", tmp_path, "validate"],
                      capture_output=True,
                      text=True,
                  )
              finally:
                  os.unlink(tmp_path)

              if result.returncode != 0:
                  failed.append((rel, result.stdout, result.stderr))

          if failed:
              print("\nValidation failed for documentation YAML files:")
              for rel, out, err in failed:
                  print(f"\n--- {rel} ---")
                  if out.strip():
                      print(out.strip())
                  if err.strip():
                      print(err.strip())
              raise SystemExit(1)

          print("All selected documentation YAML files are valid.")
          PY
        env:
          DOCS_EXAMPLE_EXCLUDE_REGEX: ${{ inputs.docs_example_exclude_regex }}
          DOCS_EXAMPLE_PLACEHOLDER_VALUES: ${{ inputs.docs_example_placeholder_values }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Install a specific version of uv.
          version: '0.8.4'
      - name: Run tests
        run: |-
          docker pull ghcr.io/home-assistant/home-assistant:2026.4.3
          cd tests
          chmod +x ubihome
          ls -l
          uv run --locked playwright install --with-deps
          uv run --locked pytest -vvv

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ inputs.target }}
          path: |
            tests/test-results
            tests/allure-results
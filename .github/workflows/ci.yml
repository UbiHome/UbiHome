name: CI

on:
  # push:
  #   branches: [ main ]

  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-24.04
            fileending: ''

          - target: arm-unknown-linux-musleabi
            runs-on: ubuntu-24.04
            fileending: ''

          - target: x86_64-apple-darwin
            runs-on: macos-26-intel
            fileending: ''

          - target: aarch64-apple-darwin
            runs-on: macos-26
            fileending: ''

          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            fileending: '.exe'

          - target: armv7-unknown-linux-musleabi
            runs-on: ubuntu-24.04
            fileending: ''
    uses: ./.github/workflows/build-and-test-template.yml
    with:
      runs-on: ${{ matrix.runs-on }}
      target: ${{ matrix.target }}
      fileending: ${{ matrix.fileending }}
    # If you might want to use a secret in the build or test job then you would need to pass secrets, inherit disables secret isolation
    secrets: inherit

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read engine version from dagger.json
        id: read-engine-version
        run: |
          echo "dagger_version=$(jq -r '.engineVersion' dagger.json | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: Cache Dagger Engine image
        id: cache-dagger
        uses: actions/cache@v5
        with:
          path: /tmp/dagger-engine.tar
          key: dagger-engine-${{ steps.read-engine-version.outputs.dagger_version }}

      - name: Load cached Dagger Engine image
        if: steps.cache-dagger.outputs.cache-hit == 'true'
        run: docker load -i /tmp/dagger-engine.tar

      - name: Pull and save Dagger Engine image
        if: steps.cache-dagger.outputs.cache-hit != 'true'
        run: |
          docker pull registry.dagger.io/engine:v${{ steps.read-engine-version.outputs.dagger_version }}
          docker save registry.dagger.io/engine:v${{ steps.read-engine-version.outputs.dagger_version }} \
            -o /tmp/dagger-engine.tar

      - name: Run checks
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ steps.read-engine-version.outputs.dagger_version }}
          check: "**"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
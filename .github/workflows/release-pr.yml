name: Create Release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch release branch
        run: git fetch origin release:release

      - name: Check for differences
        id: diff
        run: |
          if git diff --quiet release..main; then
            echo "No changes to release branch."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate next changelog (dry run)
        if: steps.diff.outputs.skip == 'false'
        run: |
          npx semantic-release --dry-run --no-ci > sr.log || true
          awk '/^\s*---\s*$/ {p=1; next} /^\s*$/ {p=0} p' sr.log > NEXT_CHANGELOG.md || true

      - name: Read changelog for PR
        if: steps.diff.outputs.skip == 'false'
        id: changelog
        run: |
          if [ -s NEXT_CHANGELOG.md ]; then
            echo 'body<<EOF' >> $GITHUB_OUTPUT
            cat NEXT_CHANGELOG.md >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
            rm NEXT_CHANGELOG.md
          else
            echo 'body=No changelog generated.' >> $GITHUB_OUTPUT
          fi
          git status

      - name: Create PR from main to release
        if: steps.diff.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CUSTOM_GITHUB_PAT }}
          script: |
            const title = 'release: stable release';
            const body = process.env.PR_BODY;
            const base = 'release';
            const head = 'main';

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base,
              head: `${context.repo.owner}:${head}`,
            });

            if (existing.length > 0) {
              core.info(`PR already exists: #${existing[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              base,
              head,
              draft: false,
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
        env:
          PR_BODY: ${{ steps.changelog.outputs.body }}

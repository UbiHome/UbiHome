[package]
name = "ubihome-sendspin"
version = "0.10.1"
authors = ["Daniel Habenicht <daniel-habenicht@outlook.de>"]
edition = "2021"

[dependencies]
sendspin = { git = "https://github.com/DanielHabenicht/fork.sendspin-rs", rev = "b2ee36685614c5ef8a4b861f801f5f340e53932e" } #branch = "rollback-sendspin"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
ubihome-core = { path = "../core", features = ["ip"] }
serde_yaml = "0.9.34"
duration-str = "0.16.1"
uuid = "1.19.0"
tokio-tungstenite = "0.24.0"
# tokio-tungstenite = { version = "0.24.0", features = ["rustls-tls-native-roots"] }
parking_lot = "0.12"
mdns-sd = "0.17.2"
cpal = "0.16.0"

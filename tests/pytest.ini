[pytest]
asyncio_mode = auto
timeout = 20
addopts = -m "not e2e"
log_cli = 1
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S
markers =
    e2e: Playwright end-to-end tests requiring Docker and Home Assistant
